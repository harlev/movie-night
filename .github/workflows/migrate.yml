name: Run Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'next-app/supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new migration files
        id: migrations
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 -- 'next-app/supabase/migrations/*.sql' | sort)
          if [ -z "$FILES" ]; then
            # For manual triggers, find all migration files
            FILES=$(ls next-app/supabase/migrations/*.sql 2>/dev/null | sort)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found migration files:"
          echo "$FILES"

      - name: Run migrations
        if: steps.migrations.outputs.files != ''
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Running migration: $file"
            psql "$SUPABASE_DB_URL" -f "$file"
          done <<< "${{ steps.migrations.outputs.files }}"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
